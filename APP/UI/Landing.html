<!DOCTYPE html>
<html data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content=" default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;">
  <title>SUTRIKA</title>

  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./Style/Common.css">
  <link rel="stylesheet" href="./Style/Landing.css">
</head>

<body>
<header>
  
  <nav id="TopBar" class="navbar navbar-dark border-bottom px-4 shadow fixed-top">

    <div class="d-flex align-items-center gap-3">    
      <div id="Home-Call" data-page="./Landing.html">
        <img src="./Resources/SutrikaBlack.png" id="Logo">
        <div id="TitleDescription">Universal UDS & CAN Tool</div>
        <div id="TitleVersion">Version: 3.14</div>
      </div>
    </div>

    <div class="form-check form-switch d-flex flex-column align-items-center">
      <input class="form-check-input m-0" type="checkbox" id="LoggingToggle">
      <label class="form-check-label fs-5 fw-semibold mt-2" for="LoggingToggle" id="LoggingText">Logger</label>
    </div>

  </nav>

</header>
<main>

  <div id="Page" class="container-fluid">
    <div class="d-flex justify-content-center">
      <div class="w-75">
        
        <div class="card feature-card mb-4 shadow border-0" data-page="./UDS.html">
          <div class="card-body d-flex align-items-center gap-4">
            <div class="display-6">🩺</div>
            <div class="fs-3 fw-semibold">UDS Diagnostics Dashboard</div>
          </div>
        </div>

        <div class="card feature-card mb-4 shadow border-0" data-page="./Flash.html">
          <div class="card-body d-flex align-items-center gap-4">
            <div class="display-6">⚡</div>
            <div class="fs-3 fw-semibold">Flash ECU Dashboard</div>
          </div>
        </div>

        <div class="card feature-card mb-4 shadow border-0" data-page="./CAN.html">
          <div class="card-body d-flex align-items-center gap-4">
            <div class="display-6">🔭</div>
            <div class="fs-3 fw-semibold">Monitor CAN Bus</div>
          </div>
        </div>

        <div class="card feature-card mb-4 shadow border-0" data-page="./Advance.html">
          <div class="card-body d-flex align-items-center gap-4">
            <div class="display-6">🛰️</div>
            <div class="fs-3 fw-semibold">Advance Sutrika Engine</div>
          </div>
        </div>

        <div class="card feature-card mb-4 shadow border-0" data-page="./Configuration.html">
          <div class="card-body d-flex align-items-center gap-4">
            <div class="display-6">⚙️</div>
            <div class="fs-3 fw-semibold">Configurations</div>
          </div>
        </div>
      
      </div>
    </div>
  </div>

</main>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script src="./Scripts/Common.js"></script>
<script src="./Scripts/Landing.js"></script>

</body>
</html>
