<!DOCTYPE html>
<html data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content=" default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;">
  <title>SUTRIKA</title>

  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./Style/Common.css">
  <link rel="stylesheet" href="./Style/CAN.css">
</head>

<body>
<header>
  
  <nav id="TopBar" class="navbar navbar-dark border-bottom px-4 shadow">

    <div class="d-flex align-items-center gap-3">    
      <div id="Home-Call" data-page="./Landing.html">
        <img src="./Resources/SutrikaBlack.png" id="Logo">
        <div id="TitleDescription">Universal UDS & CAN Tool</div>
        <div id="TitleVersion">Version: 3.14</div>
      </div>
    </div>

    <div class="form-check form-switch d-flex flex-column align-items-center">
      <input class="form-check-input m-0" type="checkbox" id="LoggingToggle">
      <label class="form-check-label fs-5 fw-semibold mt-2" for="LoggingToggle" id="LoggingText">Logger</label>
    </div>

  </nav>

</header>
<main class="container-fluid">

  <div class="card section-card shadow mb-3">
    
    <div class="card-header bg-white section-header" data-bs-toggle="collapse" data-bs-target="#RawCANCollapse">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h4 class="mb-1 fw-bold">⛓️ Raw CAN Monitor</h4>
          <div class="text-muted small">Monitor Raw CAN Traffic in Real-Time</div>
        </div>
      </div>
    </div>

    <div id="RawCANCollapse" class="collapse">
      <div class="card-body">
        
        <div class="row g-4 align-items-end">
          <div class="col-md-3">
            <label class="control-label">Traffic Mode</label>
            <select class="form-select" id="RawCANMode">
              <option value="single">Single CAN ID  </option>
              <option value="range" >Range of CAN ID</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="control-label" for="RawSingleCAN">CAN ID</label>
            <input type="text" class="form-control RawSingleCAN" id="RawSingleCAN" placeholder="0x100">
          </div>
          <div class="col-md-2">
            <label class="control-label" for="RawRangeStartCAN">Start CAN ID</label>
            <input type="text" class="form-control RawRangeCAN" id="RawRangeStartCAN" placeholder="0x100">
          </div>
          <div class="col-md-2">
            <label class="control-label" for="RawRangeEndCAN">End CAN ID</label>
            <input type="text" class="form-control RawRangeCAN" id="RawRangeEndCAN"   placeholder="0x7FF">
          </div>
          <div class="col-md-3 d-grid">
            <button class="btn btn-lg btn-outline-dark" id="StartRawCANButton">Start Watching</button>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
          <div>
            <div class="fw-semibold">Rendering Mode</div>
            <div class="text-muted small">Switch Between Time Stamp Rendering & Card Rendering</div>
          </div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="RawRenderToggle">
            <label class="form-check-label ms-2" for="RawRenderToggle">Card Mode / Time Stamp Mode</label>
          </div>
        </div>

        <div id="RawCANError" class="text-danger fw-semibold mt-3"></div>

        <div class="monitor-canvas mt-3" id="RawCANCanvas">
          <div class="text-secondary">Waiting for CAN Monitoring ...</div>
        </div>

      </div>
    </div>

  </div>


  <div class="card section-card shadow mb-3">
    
    <div class="card-header bg-white section-header" data-bs-toggle="collapse" data-bs-target="#DBCCollapse">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h4 class="mb-1 fw-bold">📅 DBC Watcher</h4>
          <div class="text-muted small">DBC Message And Signal Watcher</div>
        </div>
      </div>
    </div>

    <div id="DBCCollapse" class="collapse">
      <div class="card-body">

        <div class="row g-4 align-items-end">

          <div class="col-md-5">
            <label class="control-label">DBC File</label>
            <input type="file" class="form-control" accept=".dbc" id="DBCInputFil">
          </div>
          <div class="col-md-4">
            <label class="control-label">Message ID</label>
            <select class="form-select" id="DBCMessageList">
              <option>Select DBC Message</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="control-label">Signals</label>
            <div class="dropdown w-100">
              <button class="btn btn-outline-dark dropdown-toggle w-100 text-start" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="DBCSignalListButton">Select Signals</button>
              <ul class="dropdown-menu w-100 p-3" id="DBCSignalList">

              </ul>
            </div>
          </div>

        </div>
        
        <div class="mt-4 d-grid">
          <button class="btn btn-outline-dark" id="DBCStartButton">Start Watching</button>
        </div>

        <div id="DBCCANError" class="text-danger fw-semibold mt-3"></div>

        <div class="monitor-canvas mt-4" id="DBCCanvas">
          <div class="text-secondary">Waiting For CAN Traffic ...</div>
        </div>

      </div>
    </div>

  </div>

</main>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script src="./Scripts/Common.js"></script>
<script src="./Scripts/MonitorCAN.js"></script>

</body>
</html>
